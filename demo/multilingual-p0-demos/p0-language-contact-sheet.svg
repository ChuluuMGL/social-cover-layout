<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">P0 multilingual social cover typography demos</title>
  <desc id="desc">Five controlled-typeset cover specimens for Simplified Chinese, Traditional Chinese, English, Japanese, and Korean.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#164e63"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#be5b68"/><stop offset="1" stop-color="#7c2d5b"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#164e63"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#b45309"/><stop offset="1" stop-color="#713f12"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .ui { fill: rgba(255,255,255,.16); stroke: rgba(255,255,255,.34); stroke-width: 2; }
      .label { fill: rgba(255,255,255,.78); font: 600 18px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; letter-spacing: 1px; }
      .note { fill: rgba(255,255,255,.64); font: 500 16px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
      .title { fill: #fff; font: 800 40px "Hiragino Kaku Gothic ProN", "Apple SD Gothic Neo", "STHeiti", -apple-system, sans-serif; }
      .titleEn { fill: #fff; font: 800 42px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
      .accent { font-weight: 900; }
    </style>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <text x="64" y="62" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800">P0 LANGUAGE / CONTROLLED-TYPESET DEMO</text>
  <text x="64" y="88" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16">Same cover logic · different script rules · varied accent colors</text>

  <!-- zh-Hans -->
  <g transform="translate(64 122)" filter="url(#shadow)">
    <rect width="464" height="390" rx="24" fill="url(#teal)"/>
    <rect x="28" y="28" width="120" height="30" rx="15" fill="#99f6e4" fill-opacity=".22"/>
    <text x="44" y="49" class="label">ZH-HANS · VERTICAL</text>
    <rect x="232" y="86" width="188" height="168" rx="14" class="ui"/>
    <rect x="252" y="110" width="98" height="9" rx="4" fill="#ccfbf1" fill-opacity=".8"/>
    <rect x="252" y="132" width="136" height="8" rx="4" fill="#ccfbf1" fill-opacity=".35"/>
    <rect x="252" y="168" width="128" height="58" rx="8" fill="#022c22" fill-opacity=".35"/>
    <circle cx="375" cy="198" r="31" fill="#fef3c7" fill-opacity=".9"/>
    <text x="28" y="156" class="title">内容创作</text>
    <text x="28" y="208" class="title"><tspan class="accent" fill="#99f6e4">Skill</tspan></text>
    <rect x="28" y="236" width="330" height="62" rx="16" fill="#ecfeff"/>
    <text x="50" y="276" fill="#134e4a" font-family="STHeiti, sans-serif" font-size="27" font-weight="800">写作与封面一次完成</text>
    <text x="28" y="350" class="note">kinsoku · semantic grouping · stable baseline</text>
  </g>

  <!-- zh-Hant -->
  <g transform="translate(568 122)" filter="url(#shadow)">
    <rect width="464" height="390" rx="24" fill="url(#violet)"/>
    <rect x="28" y="28" width="120" height="30" rx="15" fill="#f5d0fe" fill-opacity=".22"/>
    <text x="44" y="49" class="label">ZH-HANT · VERTICAL</text>
    <rect x="232" y="86" width="188" height="168" rx="14" class="ui"/>
    <rect x="252" y="110" width="98" height="9" rx="4" fill="#f5d0fe" fill-opacity=".8"/>
    <rect x="252" y="132" width="136" height="8" rx="4" fill="#f5d0fe" fill-opacity=".35"/>
    <rect x="252" y="168" width="128" height="58" rx="8" fill="#2e1065" fill-opacity=".38"/>
    <circle cx="375" cy="198" r="31" fill="#fde68a" fill-opacity=".9"/>
    <text x="28" y="156" class="title">內容創作</text>
    <text x="28" y="208" class="title"><tspan class="accent" fill="#f5d0fe">Skill</tspan></text>
    <rect x="28" y="236" width="330" height="62" rx="16" fill="#fdf4ff"/>
    <text x="50" y="276" fill="#581c87" font-family="STHeiti, sans-serif" font-size="27" font-weight="800">寫作與封面一次完成</text>
    <text x="28" y="350" class="note">CJK punctuation · phrase grouping · baseline</text>
  </g>

  <!-- English -->
  <g transform="translate(1072 122)" filter="url(#shadow)">
    <rect width="464" height="390" rx="24" fill="url(#coral)"/>
    <rect x="28" y="28" width="84" height="30" rx="15" fill="#fed7aa" fill-opacity=".22"/>
    <text x="44" y="49" class="label">EN · WIDE</text>
    <rect x="250" y="88" width="170" height="158" rx="14" class="ui"/>
    <rect x="270" y="112" width="108" height="9" rx="4" fill="#ffedd5" fill-opacity=".8"/>
    <rect x="270" y="136" width="122" height="8" rx="4" fill="#ffedd5" fill-opacity=".35"/>
    <rect x="270" y="170" width="112" height="48" rx="8" fill="#431407" fill-opacity=".4"/>
    <circle cx="392" cy="206" r="28" fill="#bfdbfe" fill-opacity=".9"/>
    <text x="28" y="154" class="titleEn">Content</text>
    <text x="28" y="204" class="titleEn"><tspan class="accent" fill="#fed7aa">Creation</tspan></text>
    <rect x="28" y="232" width="190" height="62" rx="16" fill="#fff7ed"/>
    <text x="52" y="271" fill="#7c2d12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800">Write + Cover</text>
    <text x="28" y="350" class="note">word boundaries · product-name integrity</text>
  </g>

  <!-- Japanese -->
  <g transform="translate(316 572)" filter="url(#shadow)">
    <rect width="464" height="390" rx="24" fill="url(#blue)"/>
    <rect x="28" y="28" width="88" height="30" rx="15" fill="#bfdbfe" fill-opacity=".22"/>
    <text x="44" y="49" class="label">JA · SQUARE</text>
    <rect x="244" y="88" width="174" height="154" rx="14" class="ui"/>
    <rect x="264" y="112" width="104" height="9" rx="4" fill="#dbeafe" fill-opacity=".8"/>
    <rect x="264" y="136" width="130" height="8" rx="4" fill="#dbeafe" fill-opacity=".35"/>
    <rect x="264" y="170" width="116" height="46" rx="8" fill="#172554" fill-opacity=".4"/>
    <circle cx="390" cy="206" r="27" fill="#fde68a" fill-opacity=".9"/>
    <text x="28" y="154" class="title">コンテンツ制作</text>
    <text x="28" y="204" class="title"><tspan class="accent" fill="#bfdbfe">Skill</tspan></text>
    <rect x="28" y="232" width="276" height="62" rx="16" fill="#eff6ff"/>
    <text x="50" y="271" fill="#1e3a8a" font-family="Hiragino Kaku Gothic ProN, sans-serif" font-size="26" font-weight="800">書いて表紙も完成</text>
    <text x="28" y="350" class="note">kinsoku shori · kana/kanji grouping</text>
  </g>

  <!-- Korean -->
  <g transform="translate(820 572)" filter="url(#shadow)">
    <rect width="464" height="390" rx="24" fill="url(#amber)"/>
    <rect x="28" y="28" width="92" height="30" rx="15" fill="#fef3c7" fill-opacity=".22"/>
    <text x="44" y="49" class="label">KO · SQUARE</text>
    <rect x="244" y="88" width="174" height="154" rx="14" class="ui"/>
    <rect x="264" y="112" width="104" height="9" rx="4" fill="#fef3c7" fill-opacity=".8"/>
    <rect x="264" y="136" width="130" height="8" rx="4" fill="#fef3c7" fill-opacity=".35"/>
    <rect x="264" y="170" width="116" height="46" rx="8" fill="#451a03" fill-opacity=".42"/>
    <circle cx="390" cy="206" r="27" fill="#bae6fd" fill-opacity=".9"/>
    <text x="28" y="154" class="title">콘텐츠 제작</text>
    <text x="28" y="204" class="title"><tspan class="accent" fill="#fef3c7">Skill</tspan></text>
    <rect x="28" y="232" width="276" height="62" rx="16" fill="#fffbeb"/>
    <text x="50" y="271" fill="#78350f" font-family="Apple SD Gothic Neo, sans-serif" font-size="26" font-weight="800">쓰고 커버까지</text>
    <text x="28" y="350" class="note">word groups · syllable blocks · line-height</text>
  </g>
</svg>
